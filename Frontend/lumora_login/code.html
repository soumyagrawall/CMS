<style>
        body {
            background-color: #EFECE3; /* Editorial Cream Background from Style Guidance */
        }
        .editorial-lift:hover {
            box-shadow: 0px 4px 20px rgba(0,0,0,0.04);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<link href="/assets/css/lumora-tailwind.css" rel="stylesheet"/></head>
<body class="flex items-center justify-center min-h-screen p-margin-mobile md:p-0">
<main class="w-full max-w-[440px]">
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-gutter-lg md:p-10 text-center editorial-lift">
<header class="mb-10">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Lumora</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Editorial Curation</p>
</header>
<form class="space-y-6 text-left">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-secondary-container focus:border-secondary transition-all placeholder:text-outline-variant" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-secondary-container focus:border-secondary transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                        Continue
                    </button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/30">
<p class="font-body-md text-body-md text-on-surface-variant">
                    New to Lumora? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<footer class="mt-8 text-center space-x-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</footer>
</main>
<div class="fixed bottom-0 left-0 w-full overflow-hidden pointer-events-none -z-10 h-64 opacity-20">
